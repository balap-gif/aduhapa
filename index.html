<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Monitoring Rekening</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      signInWithPopup, 
      GoogleAuthProvider, 
      onAuthStateChanged, 
      signOut,
      setPersistence,
      browserLocalPersistence 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getFirestore, 
      collection, 
      query, 
      getDocs, 
      addDoc, 
      updateDoc, 
      deleteDoc, 
      doc, 
      orderBy, 
      serverTimestamp,
      limit 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ===================================================
    // 🔥 FIREBASE CONFIG (SUDAH PAKAI PUNYA ANDA)
    // ===================================================
    const firebaseConfig = {
      apiKey: "AIzaSyD-sFceI0FxvQIedtg06vSiwgYCNvmugnk",
      authDomain: "rekening-e0f8c.firebaseapp.com",
      projectId: "rekening-e0f8c",
      storageBucket: "rekening-e0f8c.firebasestorage.app",
      messagingSenderId: "1014980257989",
      appId: "1:1014980257989:web:cdd0bf7f0f1541638ca8ac"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    
    setPersistence(auth, browserLocalPersistence);

    // State
    let currentUser = null;
    let currentUserRole = 'USER';
    const ADMIN_EMAILS = ['haris789smb@gmail.com'];

    // DOM Elements
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfo = document.getElementById('userInfo');
    const mainContent = document.getElementById('mainContent');
    const sidebar = document.getElementById('sidebar');
    const pageTitle = document.getElementById('pageTitle');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const errorBanner = document.getElementById('errorBanner');
    const errorMessage = document.getElementById('errorMessage');

    function showError(message) {
      errorMessage.textContent = message;
      errorBanner.classList.remove('hidden');
    }

    function hideError() {
      errorBanner.classList.add('hidden');
    }

    function showLoading(show) {
      loadingOverlay.style.display = show ? 'flex' : 'none';
    }

    function showNotification(message, type = 'success') {
      const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        warning: 'bg-yellow-500',
        info: 'bg-blue-500'
      };
      const container = document.getElementById('notificationContainer');
      const el = document.createElement('div');
      el.className = `${colors[type] || 'bg-blue-500'} text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-3 animate-slide-down`;
      el.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i><span>${message}</span>`;
      container.appendChild(el);
      setTimeout(() => {
        el.classList.add('opacity-0', 'transition-opacity', 'duration-500');
        setTimeout(() => el.remove(), 500);
      }, 3000);
    }

    // ==================== AUTH ====================
    onAuthStateChanged(auth, async (user) => {
      showLoading(true);
      hideError();
      
      if (user) {
        currentUser = user;
        currentUserRole = ADMIN_EMAILS.includes(user.email) ? 'ADMIN' : 'USER';
        
        userInfo.innerHTML = `
          <div class="flex items-center space-x-3">
            <img src="${user.photoURL || 'https://ui-avatars.com/api/?name='+encodeURIComponent(user.displayName)}" class="w-8 h-8 rounded-full" />
            <span class="text-sm font-medium hidden sm:inline">${user.displayName}</span>
            <span class="text-xs px-2 py-0.5 rounded-full ${currentUserRole === 'ADMIN' ? 'bg-blue-100 text-blue-700' : 'bg-gray-200 text-gray-700'}">${currentUserRole}</span>
          </div>
        `;
        
        loginBtn.classList.add('hidden');
        logoutBtn.classList.remove('hidden');
        mainContent.classList.remove('hidden');
        sidebar.classList.remove('hidden');
        
        try {
          await Promise.all([
            loadDashboard(),
            loadAccounts(),
            loadHistory()
          ]);
          showNotification('Selamat datang, ' + user.displayName + '!', 'success');
        } catch (e) {
          console.error('Load data error:', e);
          showError('Gagal memuat data: ' + e.message);
        }
      } else {
        currentUser = null;
        currentUserRole = 'USER';
        userInfo.innerHTML = '';
        loginBtn.classList.remove('hidden');
        logoutBtn.classList.add('hidden');
        mainContent.classList.add('hidden');
        sidebar.classList.add('hidden');
        
        document.getElementById('dashboardContent').innerHTML = `
          <div class="text-center py-20">
            <i class="fas fa-lock text-gray-300 text-6xl mb-4"></i>
            <p class="text-gray-500">Silakan login untuk mengakses dashboard.</p>
            <button onclick="document.getElementById('loginBtn').click()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
              <i class="fab fa-google mr-2"></i>Login dengan Google
            </button>
          </div>
        `;
        document.getElementById('tableContent').innerHTML = '';
        document.getElementById('historyContent').innerHTML = '';
      }
      showLoading(false);
    });

    // Login
    loginBtn.addEventListener('click', async () => {
      try {
        showLoading(true);
        hideError();
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error('Login error:', error);
        let message = error.message;
        if (error.code === 'auth/configuration-not-found') {
          message = '⚠️ Google Authentication belum diaktifkan. Buka Firebase Console → Authentication → Sign-in methods → Enable Google.';
        } else if (error.code === 'auth/unauthorized-domain') {
          message = '⚠️ Domain tidak diizinkan. Pastikan Anda menjalankan di http://localhost:5500 dan sudah menambahkan localhost ke Authorized domains.';
        }
        showError(message);
      } finally {
        showLoading(false);
      }
    });

    // Logout
    logoutBtn.addEventListener('click', () => signOut(auth));

    // ==================== NAVIGASI ====================
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => {
          i.classList.remove('bg-blue-50', 'text-blue-600', 'border-r-4', 'border-blue-500');
        });
        item.classList.add('bg-blue-50', 'text-blue-600', 'border-r-4', 'border-blue-500');
        
        const page = item.dataset.page;
        ['dashboardPage', 'accountsPage', 'historyPage'].forEach(id => {
          document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(page + 'Page').classList.remove('hidden');
        pageTitle.textContent = item.querySelector('span').textContent;
        
        if (page === 'dashboard') loadDashboard();
        if (page === 'accounts') loadAccounts();
        if (page === 'history') loadHistory();
      });
    });

    // ==================== FUNGSI UTAMA ====================
    let accountsData = [];

    async function loadDashboard() {
      try {
        const snap = await getDocs(collection(db, 'accounts'));
        const accounts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const total = accounts.length;
        const statusCount = { 'Belum Dicek': 0, 'Sedang Dicek': 0, 'Sudah Dicek': 0, 'Bermasalah': 0 };
        accounts.forEach(acc => {
          const s = acc.statusPengecekan || 'Belum Dicek';
          if (statusCount[s] !== undefined) statusCount[s]++;
        });
        const progress = total ? Math.round((statusCount['Sudah Dicek'] / total) * 100) : 0;

        document.getElementById('dashboardContent').innerHTML = `
          <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
              <p class="text-xs text-gray-500">Total Rekening</p>
              <p class="text-2xl font-bold">${total}</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500">
              <p class="text-xs text-gray-500">Sudah Dicek</p>
              <p class="text-2xl font-bold text-green-600">${statusCount['Sudah Dicek']}</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500">
              <p class="text-xs text-gray-500">Belum Dicek</p>
              <p class="text-2xl font-bold text-red-600">${statusCount['Belum Dicek']}</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-500">
              <p class="text-xs text-gray-500">Sedang Dicek</p>
              <p class="text-2xl font-bold text-yellow-600">${statusCount['Sedang Dicek']}</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-500">
              <p class="text-xs text-gray-500">Bermasalah</p>
              <p class="text-2xl font-bold text-orange-600">${statusCount['Bermasalah']}</p>
            </div>
          </div>
          <div class="mt-4 bg-white p-4 rounded-xl shadow-sm">
            <div class="flex justify-between text-sm mb-1">
              <span class="text-gray-500">Progress Pengecekan</span>
              <span class="font-medium">${progress}%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
              <div class="bg-blue-600 h-3 rounded-full transition-all duration-500" style="width:${progress}%"></div>
            </div>
          </div>
        `;
      } catch (e) {
        console.error('Dashboard error:', e);
      }
    }

    async function loadAccounts() {
      try {
        const snap = await getDocs(query(collection(db, 'accounts'), orderBy('createdAt', 'desc')));
        accountsData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTable(accountsData);
      } catch (e) {
        console.error('Load accounts error:', e);
      }
    }

    function renderTable(accounts) {
      const container = document.getElementById('tableContent');
      if (!accounts || !accounts.length) {
        container.innerHTML = `<div class="text-center py-10 text-gray-500"><i class="fas fa-database text-4xl mb-3 opacity-30"></i><p>Belum ada data rekening.</p></div>`;
        return;
      }
      
      let html = `<div class="overflow-x-auto"><table class="min-w-full bg-white rounded-xl shadow-sm"><thead class="bg-gray-50 border-b"><tr>`;
      ['No', 'Bank', 'Pemilik', 'Nomor Rek', 'Status Rek', 'Status Pengecekan', 'Terakhir Dicek', 'User', 'Aksi'].forEach(h => {
        html += `<th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">${h}</th>`;
      });
      html += `</tr></thead><tbody>`;
      
      accounts.forEach((acc, idx) => {
        const statusColor = { 
          'Belum Dicek': 'bg-red-100 text-red-700', 
          'Sedang Dicek': 'bg-yellow-100 text-yellow-700', 
          'Sudah Dicek': 'bg-green-100 text-green-700', 
          'Bermasalah': 'bg-orange-100 text-orange-700' 
        };
        const sc = statusColor[acc.statusPengecekan] || 'bg-gray-100 text-gray-700';
        const isAdmin = currentUserRole === 'ADMIN';
        
        html += `<tr class="border-t hover:bg-gray-50 transition-colors">
          <td class="px-3 py-3 text-sm text-gray-500">${idx+1}</td>
          <td class="px-3 py-3 text-sm font-medium">${acc.namaBank || '-'}</td>
          <td class="px-3 py-3 text-sm">${acc.namaPemilik || '-'}</td>
          <td class="px-3 py-3 text-sm font-mono">${acc.nomorRekening || '-'}</td>
          <td class="px-3 py-3 text-sm">
            <span class="px-2 py-0.5 rounded-full text-xs ${acc.statusRekening === 'Aktif' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700'}">${acc.statusRekening || 'Aktif'}</span>
          </td>
          <td class="px-3 py-3 text-sm"><span class="px-2 py-0.5 rounded-full text-xs ${sc}">${acc.statusPengecekan || 'Belum Dicek'}</span></td>
          <td class="px-3 py-3 text-sm text-gray-500">${acc.terakhirDicek || '-'}</td>
          <td class="px-3 py-3 text-sm text-gray-500">${acc.userTerakhir || '-'}</td>
          <td class="px-3 py-3 text-sm flex flex-wrap gap-1">
            ${isAdmin ? `<button class="text-blue-500 hover:text-blue-700 edit-account p-1" data-id="${acc.id}"><i class="fas fa-edit"></i></button>` : ''}
            ${isAdmin ? `<button class="text-red-500 hover:text-red-700 delete-account p-1" data-id="${acc.id}"><i class="fas fa-trash"></i></button>` : ''}
            <button class="text-green-500 hover:text-green-700 check-account p-1" data-id="${acc.id}"><i class="fas fa-check-circle"></i></button>
          </td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
      container.innerHTML = html;

      container.querySelectorAll('.edit-account').forEach(btn => {
        btn.addEventListener('click', () => openEditForm(btn.dataset.id));
      });
      container.querySelectorAll('.delete-account').forEach(btn => {
        btn.addEventListener('click', () => deleteAccount(btn.dataset.id));
      });
      container.querySelectorAll('.check-account').forEach(btn => {
        btn.addEventListener('click', () => openCheckForm(btn.dataset.id));
      });
    }

    async function loadHistory() {
      try {
        const snap = await getDocs(query(collection(db, 'checking_history'), orderBy('timestamp', 'desc'), limit(100)));
        const container = document.getElementById('historyContent');
        
        if (snap.empty) {
          container.innerHTML = `<div class="text-center py-10 text-gray-500"><i class="fas fa-clock text-4xl mb-3 opacity-30"></i><p>Belum ada riwayat.</p></div>`;
          return;
        }
        
        let html = `<div class="overflow-x-auto"><table class="min-w-full bg-white rounded-xl shadow-sm"><thead class="bg-gray-50 border-b"><tr>`;
        ['Tanggal', 'Jam', 'User', 'Perubahan', 'Rekening', 'Status Lama', 'Status Baru'].forEach(h => {
          html += `<th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">${h}</th>`;
        });
        html += `</tr></thead><tbody>`;
        
        snap.forEach(doc => {
          const d = doc.data();
          const date = d.timestamp?.toDate?.() || new Date();
          html += `<tr class="border-t hover:bg-gray-50">
            <td class="px-3 py-2 text-sm text-gray-500">${date.toLocaleDateString('id-ID')}</td>
            <td class="px-3 py-2 text-sm text-gray-500">${date.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'})}</td>
            <td class="px-3 py-2 text-sm">${d.namaUser || '-'}</td>
            <td class="px-3 py-2 text-sm">${d.perubahan || '-'}</td>
            <td class="px-3 py-2 text-sm">${d.namaRekening || '-'}</td>
            <td class="px-3 py-2 text-sm"><span class="px-2 py-0.5 rounded-full text-xs bg-gray-100 text-gray-700">${d.statusLama || '-'}</span></td>
            <td class="px-3 py-2 text-sm"><span class="px-2 py-0.5 rounded-full text-xs bg-blue-100 text-blue-700">${d.statusBaru || '-'}</span></td>
          </tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
      } catch (e) {
        console.error('History error:', e);
      }
    }

    // ==================== MODAL ====================
    function openCheckForm(accountId) {
      const acc = accountsData.find(a => a.id === accountId);
      if (!acc) return;
      
      const modal = document.getElementById('modal');
      document.getElementById('modalTitle').textContent = '📋 Pengecekan Rekening';
      document.getElementById('modalBody').innerHTML = `
        <div class="space-y-4">
          <div class="bg-gray-50 p-3 rounded-lg">
            <p class="text-sm"><strong>Bank:</strong> ${acc.namaBank}</p>
            <p class="text-sm"><strong>Pemilik:</strong> ${acc.namaPemilik}</p>
            <p class="text-sm"><strong>Nomor:</strong> ${acc.nomorRekening}</p>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Status Pengecekan</label>
            <select id="checkStatus" class="w-full border rounded-lg p-2.5">
              <option value="Belum Dicek" ${acc.statusPengecekan==='Belum Dicek'?'selected':''}>🔴 Belum Dicek</option>
              <option value="Sedang Dicek" ${acc.statusPengecekan==='Sedang Dicek'?'selected':''}>🟡 Sedang Dicek</option>
              <option value="Sudah Dicek" ${acc.statusPengecekan==='Sudah Dicek'?'selected':''}>🟢 Sudah Dicek</option>
              <option value="Bermasalah" ${acc.statusPengecekan==='Bermasalah'?'selected':''}>🟠 Bermasalah</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Catatan</label>
            <textarea id="checkNote" class="w-full border rounded-lg p-2.5" rows="3">${acc.catatan || ''}</textarea>
          </div>
          <button id="saveCheckBtn" class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium">
            <i class="fas fa-save mr-2"></i>Simpan Pengecekan
          </button>
        </div>
      `;
      modal.classList.remove('hidden');
      
      document.getElementById('saveCheckBtn').addEventListener('click', async () => {
        try {
          const status = document.getElementById('checkStatus').value;
          const catatan = document.getElementById('checkNote').value;
          const now = new Date();
          const tgl = now.toLocaleDateString('id-ID');
          const jam = now.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
          
          await updateDoc(doc(db, 'accounts', accountId), {
            statusPengecekan: status,
            catatan: catatan,
            terakhirDicek: `${tgl} ${jam}`,
            userTerakhir: currentUser.displayName || currentUser.email,
            lastUpdate: serverTimestamp()
          });
          
          await addDoc(collection(db, 'checking_history'), {
            timestamp: serverTimestamp(),
            namaUser: currentUser.displayName || currentUser.email,
            perubahan: 'Pengecekan',
            namaRekening: `${acc.namaBank} - ${acc.namaPemilik}`,
            statusLama: acc.statusPengecekan || 'Belum Dicek',
            statusBaru: status,
            accountId: accountId
          });
          
          modal.classList.add('hidden');
          await Promise.all([loadAccounts(), loadDashboard(), loadHistory()]);
          showNotification('✅ Pengecekan berhasil disimpan!', 'success');
        } catch (e) {
          console.error('Save check error:', e);
          alert('Gagal menyimpan: ' + e.message);
        }
      });
    }

    function openEditForm(accountId) {
      if (currentUserRole !== 'ADMIN') {
        alert('Hanya ADMIN yang dapat mengedit rekening.');
        return;
      }
      const acc = accountsData.find(a => a.id === accountId);
      if (!acc) return;
      
      const modal = document.getElementById('modal');
      document.getElementById('modalTitle').textContent = '✏️ Edit Rekening (ADMIN)';
      document.getElementById('modalBody').innerHTML = `
        <div class="space-y-3">
          <input id="editBank" value="${acc.namaBank || ''}" placeholder="Nama Bank" class="w-full border rounded-lg p-2.5" />
          <input id="editPemilik" value="${acc.namaPemilik || ''}" placeholder="Nama Pemilik" class="w-full border rounded-lg p-2.5" />
          <input id="editNomor" value="${acc.nomorRekening || ''}" placeholder="Nomor Rekening" class="w-full border rounded-lg p-2.5" />
          <input id="editUsername" value="${acc.usernameInternet || ''}" placeholder="Username Internet" class="w-full border rounded-lg p-2.5" />
          <input id="editCabang" value="${acc.cabang || ''}" placeholder="Cabang" class="w-full border rounded-lg p-2.5" />
          <select id="editStatusRek" class="w-full border rounded-lg p-2.5">
            <option value="Aktif" ${acc.statusRekening==='Aktif'?'selected':''}>Aktif</option>
            <option value="Nonaktif" ${acc.statusRekening==='Nonaktif'?'selected':''}>Nonaktif</option>
          </select>
          <button id="saveEditBtn" class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium">
            <i class="fas fa-save mr-2"></i>Update Rekening
          </button>
        </div>
      `;
      modal.classList.remove('hidden');
      
      document.getElementById('saveEditBtn').addEventListener('click', async () => {
        try {
          await updateDoc(doc(db, 'accounts', accountId), {
            namaBank: document.getElementById('editBank').value,
            namaPemilik: document.getElementById('editPemilik').value,
            nomorRekening: document.getElementById('editNomor').value,
            usernameInternet: document.getElementById('editUsername').value,
            cabang: document.getElementById('editCabang').value,
            statusRekening: document.getElementById('editStatusRek').value,
            lastUpdate: serverTimestamp()
          });
          modal.classList.add('hidden');
          await Promise.all([loadAccounts(), loadDashboard()]);
          showNotification('✅ Rekening berhasil diupdate!', 'success');
        } catch (e) {
          console.error('Update error:', e);
          alert('Gagal update: ' + e.message);
        }
      });
    }

    async function deleteAccount(id) {
      if (currentUserRole !== 'ADMIN') {
        alert('Hanya ADMIN yang dapat menghapus rekening.');
        return;
      }
      if (!confirm('⚠️ Yakin ingin menghapus rekening ini?')) return;
      try {
        await deleteDoc(doc(db, 'accounts', id));
        await Promise.all([loadAccounts(), loadDashboard()]);
        showNotification('✅ Rekening berhasil dihapus!', 'success');
      } catch (e) {
        console.error('Delete error:', e);
        alert('Gagal hapus: ' + e.message);
      }
    }

    // ==================== ADD ACCOUNT ====================
    document.getElementById('addAccountBtn').addEventListener('click', () => {
      if (currentUserRole !== 'ADMIN') {
        alert('Hanya ADMIN yang dapat menambah rekening.');
        return;
      }
      
      const modal = document.getElementById('modal');
      document.getElementById('modalTitle').textContent = '➕ Tambah Rekening Baru';
      document.getElementById('modalBody').innerHTML = `
        <div class="space-y-3">
          <input id="newBank" placeholder="Nama Bank *" class="w-full border rounded-lg p-2.5" />
          <input id="newPemilik" placeholder="Nama Pemilik *" class="w-full border rounded-lg p-2.5" />
          <input id="newNomor" placeholder="Nomor Rekening *" class="w-full border rounded-lg p-2.5" />
          <input id="newUsername" placeholder="Username Internet (opsional)" class="w-full border rounded-lg p-2.5" />
          <input id="newCabang" placeholder="Cabang" class="w-full border rounded-lg p-2.5" />
          <select id="newStatusRek" class="w-full border rounded-lg p-2.5">
            <option value="Aktif">Aktif</option>
            <option value="Nonaktif">Nonaktif</option>
          </select>
          <button id="saveNewBtn" class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium">
            <i class="fas fa-plus mr-2"></i>Simpan Rekening
          </button>
        </div>
      `;
      modal.classList.remove('hidden');
      
      document.getElementById('saveNewBtn').addEventListener('click', async () => {
        try {
          const bank = document.getElementById('newBank').value.trim();
          const pemilik = document.getElementById('newPemilik').value.trim();
          const nomor = document.getElementById('newNomor').value.trim();
          
          if (!bank || !pemilik || !nomor) {
            alert('Nama Bank, Nama Pemilik, dan Nomor Rekening wajib diisi!');
            return;
          }
          
          await addDoc(collection(db, 'accounts'), {
            namaBank: bank,
            namaPemilik: pemilik,
            nomorRekening: nomor,
            usernameInternet: document.getElementById('newUsername').value.trim() || '',
            cabang: document.getElementById('newCabang').value.trim() || '',
            statusRekening: document.getElementById('newStatusRek').value,
            statusPengecekan: 'Belum Dicek',
            catatan: '',
            terakhirDicek: '-',
            userTerakhir: '-',
            createdAt: serverTimestamp(),
            lastUpdate: serverTimestamp()
          });
          modal.classList.add('hidden');
          await Promise.all([loadAccounts(), loadDashboard()]);
          showNotification('✅ Rekening berhasil ditambahkan!', 'success');
        } catch (e) {
          console.error('Add account error:', e);
          alert('Gagal menambah: ' + e.message);
        }
      });
    });

    // ==================== CLOSE MODAL ====================
    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('modal').classList.add('hidden');
    });
    
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        document.getElementById('modal').classList.add('hidden');
      }
    });

    // ==================== EXPORT ====================
    document.getElementById('exportExcel').addEventListener('click', () => {
      if (!accountsData.length) {
        alert('Tidak ada data untuk diexport.');
        return;
      }
      const headers = ['Nama Bank', 'Nama Pemilik', 'Nomor Rekening', 'Status Rekening', 'Status Pengecekan'];
      const rows = accountsData.map(acc => [
        acc.namaBank || '', acc.namaPemilik || '', acc.nomorRekening || '',
        acc.statusRekening || '', acc.statusPengecekan || ''
      ]);
      const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `rekening_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showNotification('✅ Export berhasil!', 'success');
    });

    // ==================== CSS ====================
    const style = document.createElement('style');
    style.textContent = `
      @keyframes slideDown {
        from { transform: translateY(-20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-down { animation: slideDown 0.3s ease-out; }
      #loadingOverlay {
        position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999;
        display: none; align-items: center; justify-content: center; flex-direction: column;
      }
      .spinner {
        width: 50px; height: 50px; border: 4px solid #e5e7eb;
        border-top-color: #3b82f6; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    `;
    document.head.appendChild(style);

    console.log('✅ Aplikasi siap!');
    console.log('📌 Jalankan dengan Live Server: http://localhost:5500');
  </script>
</head>
<body class="font-['Inter'] bg-gray-50">
  <!-- Loading -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p class="mt-4 text-gray-600 font-medium">Memuat...</p>
  </div>

  <!-- Error Banner -->
  <div id="errorBanner" class="hidden fixed top-16 left-0 right-0 z-50 bg-red-500 text-white text-center py-3 px-4 shadow-lg">
    <i class="fas fa-exclamation-triangle mr-2"></i>
    <span id="errorMessage"></span>
  </div>

  <!-- Notification -->
  <div id="notificationContainer" class="fixed top-20 right-4 z-50 space-y-2"></div>

  <div id="app" class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white shadow-sm px-4 sm:px-6 py-3 flex flex-wrap justify-between items-center border-b sticky top-0 z-40">
      <h1 class="text-lg sm:text-xl font-bold text-blue-600 flex items-center">
        <i class="fas fa-university mr-2"></i>
        <span class="hidden sm:inline">Monitor Rekening</span>
        <span class="sm:hidden">Monitor</span>
      </h1>
      <div class="flex items-center space-x-2 sm:space-x-4">
        <span id="userInfo" class="flex items-center"></span>
        <button id="loginBtn" class="bg-blue-600 text-white px-3 sm:px-4 py-1.5 rounded-lg hover:bg-blue-700 text-sm">
          <i class="fab fa-google mr-1"></i><span class="hidden sm:inline">Login</span>
        </button>
        <button id="logoutBtn" class="text-gray-600 hover:text-red-500 text-sm hidden">
          <i class="fas fa-sign-out-alt mr-1"></i><span class="hidden sm:inline">Logout</span>
        </button>
      </div>
    </header>

    <div class="flex flex-1">
      <!-- Sidebar -->
      <aside id="sidebar" class="hidden w-56 sm:w-64 bg-white border-r min-h-screen p-3 sm:p-4 space-y-1 sticky top-[65px] h-[calc(100vh-65px)] overflow-y-auto">
        <div class="nav-item cursor-pointer flex items-center space-x-3 p-2.5 rounded-lg hover:bg-blue-50 text-gray-700" data-page="dashboard">
          <i class="fas fa-chart-pie w-5"></i><span>Dashboard</span>
        </div>
        <div class="nav-item cursor-pointer flex items-center space-x-3 p-2.5 rounded-lg hover:bg-blue-50 text-gray-700" data-page="accounts">
          <i class="fas fa-table w-5"></i><span>Daftar Rekening</span>
        </div>
        <div class="nav-item cursor-pointer flex items-center space-x-3 p-2.5 rounded-lg hover:bg-blue-50 text-gray-700" data-page="history">
          <i class="fas fa-history w-5"></i><span>Riwayat</span>
        </div>
        <hr class="my-3" />
        <button id="addAccountBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 text-sm">
          <i class="fas fa-plus mr-1"></i>Tambah Rekening
        </button>
        <button id="exportExcel" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 text-sm mt-2">
          <i class="fas fa-file-excel mr-1"></i>Export Excel
        </button>
        <div class="text-xs text-gray-400 mt-4 text-center">v1.0 · Realtime</div>
      </aside>

      <!-- Main -->
      <main id="mainContent" class="hidden flex-1 p-3 sm:p-6 overflow-auto">
        <h2 id="pageTitle" class="text-xl sm:text-2xl font-semibold mb-4">Dashboard</h2>
        <div id="dashboardPage"><div id="dashboardContent" class="space-y-4"></div></div>
        <div id="accountsPage" class="hidden"><div id="tableContent"></div></div>
        <div id="historyPage" class="hidden"><div id="historyContent"></div></div>
      </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4">
      <div class="bg-white rounded-2xl shadow-xl max-w-md w-full max-h-[90vh] overflow-y-auto p-5 sm:p-6">
        <div class="flex justify-between items-center mb-4 sticky top-0 bg-white pb-2">
          <h3 id="modalTitle" class="text-lg sm:text-xl font-semibold">Form</h3>
          <button id="closeModal" class="text-gray-400 hover:text-gray-700">
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>
  </div>
</body>
</html>
