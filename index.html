<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Monitoring Sederhana</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 p-8">

  <!-- HEADER & LOGIN -->
  <div class="max-w-4xl mx-auto mb-6 flex justify-between items-center bg-white p-4 rounded shadow">
    <h1 class="text-2xl font-bold text-blue-600">Bank Monitor</h1>
    <div id="user-info" class="hidden items-center gap-3">
      <span id="user-email" class="text-gray-700"></span>
      <button id="logout-btn" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Logout</button>
    </div>
    <button id="login-btn" class="bg-blue-600 text-white px-4 py-2 rounded">Login Google</button>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content" class="hidden max-w-4xl mx-auto">
    
    <!-- FORM TAMBAH REKENING -->
    <div class="bg-white p-6 rounded shadow mb-6">
      <h2 class="text-xl font-bold mb-4">Tambah Rekening Baru</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <input type="text" id="namaBank" placeholder="Nama Bank" class="border p-2 rounded" />
        <input type="text" id="noRekening" placeholder="Nomor Rekening" class="border p-2 rounded" />
        <input type="text" id="namaPemilik" placeholder="Nama Pemilik" class="border p-2 rounded" />
      </div>
      <button id="save-btn" class="bg-green-500 text-white px-4 py-2 rounded w-full md:w-auto">Simpan Data</button>
    </div>

    <!-- TABEL DATA REKENING -->
    <div class="bg-white p-6 rounded shadow">
      <h2 class="text-xl font-bold mb-4">Daftar Rekening</h2>
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b bg-gray-50">
            <th class="p-3">No</th>
            <th class="p-3">Nama Bank</th>
            <th class="p-3">No Rekening</th>
            <th class="p-3">Pemilik</th>
            <th class="p-3">Status</th>
            <th class="p-3 text-center">Aksi</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- Data akan masuk di sini -->
        </tbody>
      </table>
    </div>

  </div>

  <script>
    // ==========================================
    // 1. KONFIGURASI FIREBASE (GANTI DENGAN PUNYA ANDA)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyD-sFceI0FxvQIedtg06vSiwgYCNvmugnk",
      authDomain: "rekening-e0f8c.firebaseapp.com",
      projectId: "rekening-e0f8c",
      storageBucket: "rekening-e0f8c.firebasestorage.app",
      messagingSenderId: "1014980257989",
      appId: "1:1014980257989:web:cdd0bf7f0f1541638ca8ac"
    };

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ==========================================
    // 2. VARIABEL DOM
    // ==========================================
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userInfo = document.getElementById('user-info');
    const userEmail = document.getElementById('user-email');
    const mainContent = document.getElementById('main-content');
    const saveBtn = document.getElementById('save-btn');
    const tableBody = document.getElementById('table-body');

    // ==========================================
    // 3. FUNGSI AUTHENTICATION
    // ==========================================
    loginBtn.addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => alert("Gagal login: " + err.message));
    });

    logoutBtn.addEventListener('click', () => auth.signOut());

    // Cek status login
    auth.onAuthStateChanged(user => {
      if (user) {
        // Jika sudah login
        loginBtn.classList.add('hidden');
        userInfo.classList.remove('hidden');
        userInfo.classList.add('flex');
        userEmail.textContent = user.email;
        mainContent.classList.remove('hidden');
        
        // Panggil fungsi load data
        loadDataRealtime();
      } else {
        // Jika belum login
        loginBtn.classList.remove('hidden');
        userInfo.classList.add('hidden');
        userInfo.classList.remove('flex');
        mainContent.classList.add('hidden');
      }
    });

    // ==========================================
    // 4. FUNGSI CRUD FIRESTORE
    // ==========================================

    // Fungsi Simpan Data
    saveBtn.addEventListener('click', async () => {
      const bank = document.getElementById('namaBank').value;
      const rek = document.getElementById('noRekening').value;
      const pemilik = document.getElementById('namaPemilik').value;

      if (!bank || !rek || !pemilik) {
        alert("Semua kolom wajib diisi!");
        return;
      }

      try {
        await db.collection('accounts').add({
          namaBank: bank,
          nomorRekening: rek,
          namaPemilik: pemilik,
          status: "Aktif",
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        // Kosongkan form
        document.getElementById('namaBank').value = '';
        document.getElementById('noRekening').value = '';
        document.getElementById('namaPemilik').value = '';
        
        alert("Data berhasil disimpan!");
      } catch (err) {
        alert("Gagal menyimpan: " + err.message);
      }
    });

    // Fungsi Load Data Realtime
    function loadDataRealtime() {
      db.collection('accounts').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
        let html = '';
        let no = 1;
        
        snapshot.forEach(doc => {
          const data = doc.data();
          html += `
            <tr class="border-b hover:bg-gray-50">
              <td class="p-3">${no++}</td>
              <td class="p-3">${data.namaBank}</td>
              <td class="p-3">${data.nomorRekening}</td>
              <td class="p-3">${data.namaPemilik}</td>
              <td class="p-3"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">${data.status}</span></td>
              <td class="p-3 text-center">
                <button onclick="deleteData('${doc.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-xs">Hapus</button>
              </td>
            </tr>
          `;
        });
        
        tableBody.innerHTML = html;
      });
    }

    // Fungsi Hapus Data
    window.deleteData = async (id) => {
      if (confirm("Yakin ingin menghapus data ini?")) {
        try {
          await db.collection('accounts').doc(id).delete();
          alert("Data berhasil dihapus");
        } catch (err) {
          alert("Gagal hapus: " + err.message);
        }
      }
    };
  </script>
</body>
</html>
